<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomás · verifica lo que se dice</title>
  <meta name="description" content="Tomás es un agente de análisis con cara y voz: le das una afirmación o pregunta sobre política y te dice si es verdad, contrastando todas las orillas y citando cada fuente." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="masthead">
    <a class="brand" href="/" aria-label="Tomás, inicio">
      <span class="brand-face" aria-hidden="true">
        <!-- Mini-Tomás: la marca es su cara. -->
        <svg viewBox="0 0 48 48" class="mini-avatar">
          <circle cx="24" cy="23" r="16" class="sk" />
          <path d="M9 22 Q12 7 24 7 Q36 7 39 22 Q31 15 24 15 Q17 15 9 22 Z" class="hair" />
          <circle cx="18" cy="24" r="6.4" class="lens" />
          <circle cx="31" cy="24" r="6.4" class="lens" />
          <path d="M24.2 23 q-.2 -1.2 .6 -1.2" class="frame" />
          <circle cx="18" cy="24" r="1.7" class="eye" />
          <circle cx="31" cy="24" r="1.7" class="eye" />
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">Tomás</span>
        <span class="brand-sub">análisis factual</span>
      </span>
    </a>
    <div class="controls">
      <div class="ctrl">
        <span class="ctrl-lbl">Profundidad</span>
        <div class="seg" role="group" aria-label="Profundidad del análisis">
          <button type="button" data-rigor="rapido" class="seg-opt" title="Menos fuentes, respuesta más rápida.">Rápido</button>
          <button type="button" data-rigor="riguroso" class="seg-opt is-on" title="Más fuentes y contraste.">A fondo</button>
        </div>
      </div>
      <div class="ctrl">
        <span class="ctrl-lbl">Respuesta</span>
        <div class="seg" role="group" aria-label="Largo de la respuesta">
          <button type="button" data-largo="corta" class="seg-opt is-on" title="1-2 frases.">Corta</button>
          <button type="button" data-largo="normal" class="seg-opt" title="Un párrafo.">Normal</button>
          <button type="button" data-largo="detallada" class="seg-opt" title="Con contexto y matices.">Detallada</button>
        </div>
      </div>
      <div class="ctrl">
        <span class="ctrl-lbl">Detalle</span>
        <div class="seg" role="group" aria-label="Nivel de detalle">
          <button type="button" data-detalle="simple" class="seg-opt is-on" title="Lenguaje llano.">Simple</button>
          <button type="button" data-detalle="tecnico" class="seg-opt" title="Cifras y metodología.">Técnico</button>
        </div>
      </div>
    </div>
  </header>

  <main id="hilo" class="hilo">
    <section class="hero" id="hero">
      <figure class="hero-retrato">
        <span class="retrato-disco" aria-hidden="true"></span>
        <!-- Tomás, el personaje. Escéptico amable: ceja alzada, gafas, parpadea. -->
        <svg viewBox="0 0 200 220" class="avatar" id="tomas" role="img" aria-label="Retrato de Tomás, un verificador de hechos con gafas y una ceja alzada.">
          <path class="sweater" d="M40 220 Q40 158 100 158 Q160 158 160 220 Z" />
          <path class="collar" d="M84 162 Q100 178 116 162 L116 158 L84 158 Z" />
          <rect class="sk" x="90" y="138" width="20" height="26" rx="9" />
          <ellipse class="sk head" cx="100" cy="96" rx="52" ry="56" />
          <circle class="sk" cx="48" cy="100" r="9" />
          <circle class="sk" cx="152" cy="100" r="9" />
          <path class="hair" d="M48 86 Q50 36 100 34 Q150 36 152 86 Q150 70 134 62 Q150 58 146 50 Q120 40 100 41 Q66 40 54 54 Q49 70 48 86 Z" />
          <g class="gafas">
            <circle class="lens" cx="76" cy="98" r="21" />
            <circle class="lens" cx="124" cy="98" r="21" />
            <path class="frame" d="M97 95 q3 -4 6 0" />
            <path class="frame" d="M55 96 L44 99" />
            <path class="frame" d="M145 96 L156 99" />
          </g>
          <path class="ceja" d="M62 70 q14 -7 28 -2" />
          <path class="ceja ceja--alta" d="M112 64 q14 -6 28 1" />
          <g class="ojos">
            <circle class="eye" cx="76" cy="99" r="4.4" />
            <circle class="eye" cx="124" cy="99" r="4.4" />
          </g>
          <path class="nariz" d="M100 104 l-4 16 l8 0" />
          <path class="boca" d="M82 132 q18 11 36 -1" />
        </svg>
      </figure>

      <div class="hero-copy">
        <h1 class="hero-title">Cuéntame qué has&nbsp;oído.</h1>
        <p class="hero-lead">Y te digo si es verdad —con las pruebas a la vista.</p>
      </div>
    </section>
  </main>

  <form id="composer" class="composer" autocomplete="off">
    <div class="composer-inner">
      <textarea id="entrada" rows="1" placeholder="Dime qué quieres que verifique…" aria-label="Tu pregunta o afirmación"></textarea>
      <button id="enviar" type="submit" aria-label="Validar">
        <span>Validar</span>
        <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </form>

  <script src="/static/app.js"></script>
</body>
</html>
